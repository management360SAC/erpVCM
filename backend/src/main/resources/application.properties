# ───────── App / servidor ─────────
spring.application.name=${SPRING_APPLICATION_NAME:vcm-crm}
server.port=${SERVER_PORT:8080}


# ───────── Datasource (MySQL) ─────────
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://db:3306/vcm_crm?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:app}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:app_pw}

# ───────── JPA / Hibernate ─────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# ───────── Actuator ─────────
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,mappings

# ───────── CORS (usado por SecurityConfig) ─────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
# ───────── JWT ─────────
app.jwt.secret=${JWT_SECRET:supersecreto}
